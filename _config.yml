# =============================================
# SITE SETTINGS
# =============================================
title: "My blog about data"
author:
  name: Brynja
  email: brynjad93@gmail.com

description: "Notes on data science, machine learning, and statistics."
url: "https://brynjads.github.io"
baseurl: ""

# =============================================
# THEME
# =============================================
remote_theme: jekyll/minima   # use this for GitHub Pages
# theme: minima               # use this only if running Jekyll locally

# =============================================
# MINIMA-SPECIFIC SETTINGS
# =============================================
minima:
  date_format: "%b %-d, %Y"   # e.g. "Mar 25, 2026"
  show_excerpts: true          # shows post previews on the homepage

  social_links:
    - title: GitHub
      icon: github
      url: "https://github.com/brynjads"
    # - title: LinkedIn
    #   icon: linkedin
    #   url: "https://linkedin.com/in/yourprofile"
    # - title: Twitter/X
    #   icon: x-twitter
    #   url: "https://x.com/yourhandle"

# =============================================
# PLUGINS (required for GitHub Pages)
# =============================================
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# =============================================
# BUILD SETTINGS
# =============================================
markdown: kramdown
permalink: /:year/:month/:day/:title/
